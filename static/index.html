<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Launcher HUD</title>
  <style>
    :root {
      --hud-green: #00ff88;
      --hud-dim: rgba(0, 255, 136, 0.55);
      --hud-bg: #020403;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--hud-bg);
      color: var(--hud-green);
      font-family: "Courier New", Courier, monospace;
      min-height: 100vh;
      overflow: hidden;
    }

    #boot-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--hud-bg);
      transition: opacity 1s ease;
    }

    #boot-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #wifi-logo {
      width: 88px;
      height: 88px;
      margin-bottom: 28px;
      overflow: visible;
    }

    #wifi-logo .wifi-dot { fill: var(--hud-green); }

    #wifi-logo .wifi-arc {
      fill: none;
      stroke: var(--hud-green);
      stroke-width: 3;
      stroke-linecap: round;
    }

    #wifi-logo.animating .wifi-dot { animation: wifiFlash 0.9s ease-in-out infinite 0s; }
    #wifi-logo.animating .arc1 { animation: wifiFlash 0.9s ease-in-out infinite 0.12s; }
    #wifi-logo.animating .arc2 { animation: wifiFlash 0.9s ease-in-out infinite 0.24s; }
    #wifi-logo.animating .arc3 { animation: wifiFlash 0.9s ease-in-out infinite 0.36s; }

    @keyframes wifiFlash {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 1; }
    }

    #boot-text {
      font-size: clamp(16px, 3.5vw, 28px);
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 0 0 10px var(--hud-green);
      padding: 0 20px;
      min-height: 2.5em;
      transition: opacity 0.4s ease;
      max-width: 95vw;
      line-height: 1.4;
    }

    #boot-text.fading { opacity: 0; }

    #intro-screen {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    #intro-screen.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #intro-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #intro-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    #control-panel {
      position: fixed;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
    }

    #control-panel.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #hud-frame {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    .hud-corner {
      position: absolute;
      width: 48px;
      height: 48px;
      border-color: var(--hud-green);
      border-style: solid;
      opacity: 0.9;
      filter: drop-shadow(0 0 4px var(--hud-green));
    }

    .hud-corner.tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; }
    .hud-corner.tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; }
    .hud-corner.bl { bottom: 16px; left: 16px; border-width: 0 0 2px 2px; }
    .hud-corner.br { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; }

    .hud-banner {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(10px, 2vw, 13px);
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--hud-dim);
      border: 1px solid rgba(0, 255, 136, 0.35);
      padding: 6px 14px;
      white-space: nowrap;
    }

    .hud-scale {
      position: absolute;
      color: var(--hud-green);
      text-shadow: 0 0 6px rgba(0, 255, 136, 0.4);
    }

    .hud-scale .scale-label {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--hud-dim);
      text-transform: uppercase;
    }

    #hud-left-scale {
      left: max(56px, env(safe-area-inset-left));
      top: 50%;
      transform: translateY(-50%);
      width: 56px;
      height: min(58vh, 420px);
    }

    #hud-left-scale .scale-track {
      position: relative;
      margin-top: 8px;
      height: calc(100% - 24px);
      border-left: 1px solid rgba(0, 255, 136, 0.45);
    }

    #hud-left-scale .scale-tick {
      position: absolute;
      left: 0;
      width: 100%;
      font-size: 11px;
      transform: translateY(50%);
    }

    #hud-left-scale .scale-tick::before {
      content: "";
      position: absolute;
      left: -8px;
      top: 50%;
      width: 8px;
      height: 1px;
      background: var(--hud-green);
    }

    #hud-left-scale .scale-marker {
      position: absolute;
      left: -14px;
      top: 0;
      transform: translateY(-50%);
      width: 0;
      height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-right: 10px solid var(--hud-green);
      filter: drop-shadow(0 0 4px var(--hud-green));
    }

    #hud-top-tape {
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      width: min(58vw, 560px);
    }

    #hud-top-tape .pan-rail {
      position: relative;
      margin-top: 6px;
      padding-top: 14px;
    }

    #hud-top-tape .pan-viewport {
      position: relative;
      height: 28px;
      overflow: hidden;
      border-bottom: 1px solid rgba(0, 255, 136, 0.45);
    }

    #hud-top-tape .pan-pointer {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 10px solid var(--hud-green);
      filter: drop-shadow(0 0 4px var(--hud-green));
      pointer-events: none;
    }

    #hud-top-tape #pan-track {
      position: absolute;
      top: 0;
      left: 0;
      height: 28px;
      will-change: transform;
      transition: transform 0.06s linear;
    }

    #hud-top-tape #pan-track .scale-tick {
      position: absolute;
      bottom: 0;
      font-size: 10px;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    #hud-top-tape #pan-track .scale-tick::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 100%;
      width: 1px;
      height: 6px;
      background: var(--hud-green);
      transform: translateX(-50%);
    }

    #hud-right-scale {
      right: max(64px, env(safe-area-inset-right));
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: min(58vh, 420px);
      text-align: right;
      padding-right: 8px;
    }

    #hud-right-scale .tilt-viewport {
      position: relative;
      margin-top: 8px;
      height: calc(100% - 24px);
      overflow: hidden;
      border-right: 1px solid rgba(0, 255, 136, 0.45);
    }

    #hud-right-scale .tilt-pointer {
      position: absolute;
      right: -26px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      width: 0;
      height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 10px solid var(--hud-green);
      filter: drop-shadow(0 0 4px var(--hud-green));
      pointer-events: none;
    }

    #hud-right-scale #tilt-track {
      position: absolute;
      left: 0;
      right: 12px;
      top: 0;
      will-change: transform;
      transition: transform 0.12s linear;
    }

    #hud-right-scale #tilt-track .scale-tick {
      position: absolute;
      right: 0;
      width: 100%;
      font-size: 11px;
      transform: translateY(50%);
    }

    #hud-right-scale #tilt-track .scale-tick::after {
      content: "";
      position: absolute;
      right: -8px;
      top: 50%;
      width: 8px;
      height: 1px;
      background: var(--hud-green);
    }

    #hud-bottom-left {
      position: absolute;
      left: max(24px, env(safe-area-inset-left));
      bottom: max(28px, env(safe-area-inset-bottom));
      font-size: clamp(11px, 2vw, 14px);
      letter-spacing: 1px;
      line-height: 2;
      text-transform: uppercase;
      z-index: 6;
    }

    #hud-bottom-left > div {
      margin-bottom: 4px;
    }

    #hud-bottom-left .dim { color: var(--hud-dim); }

    #control-center {
      position: absolute;
      left: max(80px, calc(env(safe-area-inset-left) + 64px));
      bottom: max(96px, calc(env(safe-area-inset-bottom) + 80px));
      z-index: 20;
    }

    .dpad {
      display: grid;
      grid-template-columns: 58px 58px 58px;
      grid-template-rows: 58px 58px 58px;
      gap: 5px;
    }

    .arrow-btn {
      width: 58px;
      height: 58px;
      padding: 0;
      border: 1px solid rgba(220, 220, 220, 0.35);
      background: rgba(128, 128, 128, 0.5);
      cursor: pointer;
      font-size: 0;
      color: transparent;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.15s;
    }

    .arrow-btn.holding {
      background: rgba(150, 150, 150, 0.7);
    }

    .arrow-btn.up { grid-column: 2; grid-row: 1; clip-path: polygon(50% 6%, 88% 82%, 12% 82%); }
    .arrow-btn.down { grid-column: 2; grid-row: 3; clip-path: polygon(12% 18%, 88% 18%, 50% 94%); }
    .arrow-btn.left { grid-column: 1; grid-row: 2; clip-path: polygon(6% 50%, 82% 12%, 82% 88%); }
    .arrow-btn.right { grid-column: 3; grid-row: 2; clip-path: polygon(18% 12%, 94% 50%, 18% 88%); }
  </style>
</head>
<body>
  <div id="boot-screen">
    <svg id="wifi-logo" class="animating" viewBox="0 0 80 80" overflow="visible" aria-hidden="true">
      <circle class="wifi-dot" cx="40" cy="60" r="4"/>
      <path class="wifi-arc arc1" d="M 33 60 A 7 7 0 0 1 47 60"/>
      <path class="wifi-arc arc2" d="M 18 60 A 22 22 0 0 1 62 60"/>
      <path class="wifi-arc arc3" d="M 0 60 A 40 40 0 0 1 80 60"/>
    </svg>
    <div id="boot-text"></div>
  </div>

  <div id="intro-screen" aria-hidden="true">
    <video id="intro-video" playsinline preload="auto" loop="false"></video>
  </div>

  <div id="control-panel">
    <div id="hud-frame">
      <div class="hud-corner tl"></div>
      <div class="hud-corner tr"></div>
      <div class="hud-corner bl"></div>
      <div class="hud-corner br"></div>
      <div class="hud-banner">Transmission: Secure // Low Latency</div>

      <div id="hud-left-scale" class="hud-scale">
        <div class="scale-label">Sys Load</div>
        <div class="scale-track" id="left-track">
          <div class="scale-marker" id="left-marker"></div>
        </div>
      </div>

      <div id="hud-top-tape" class="hud-scale">
        <div class="scale-label">Pan</div>
        <div class="pan-rail">
          <div class="pan-pointer" id="pan-pointer" aria-hidden="true"></div>
          <div class="pan-viewport" id="pan-viewport">
            <div id="pan-track"></div>
          </div>
        </div>
      </div>

      <div id="hud-right-scale" class="hud-scale">
        <div class="scale-label">Tilt</div>
        <div class="tilt-viewport" id="tilt-viewport">
          <div class="tilt-pointer" aria-hidden="true"></div>
          <div id="tilt-track"></div>
        </div>
      </div>

      <div id="hud-bottom-left">
        <div id="battery-label">Battery: --%</div>
        <div class="dim" id="sig-label">Sig Str: 100%</div>
      </div>

    </div>

    <div id="control-center">
      <div class="dpad" aria-label="Directional controls">
        <button class="arrow-btn up" type="button" data-cmd="up" aria-label="Up"></button>
        <button class="arrow-btn left" type="button" data-cmd="left" aria-label="Left"></button>
        <button class="arrow-btn right" type="button" data-cmd="right" aria-label="Right"></button>
        <button class="arrow-btn down" type="button" data-cmd="down" aria-label="Down"></button>
      </div>
    </div>
  </div>

  <script>
    const SCRAMBLE_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*';
    const INTRO_VIDEO_URL = '/assets/Intro.mp4';
    const BOOT_MESSAGES = [
      { text: 'CONNECTING TO SATELLITE', reveal: 1500, hold: 800, fade: 400 },
      { text: 'SATELLITE UPLINK ESTABLISHED', reveal: 1800, hold: 800, fade: 400 },
      { text: 'CONNECTING TO COMMAND SUITE', reveal: 1600, hold: 800, fade: 400 },
      { text: 'CONNECTION ESTABLISHED, RENDERING HUD', reveal: 2200, hold: 1000, fade: 600 }
    ];

    const PAN_MIN = -180, PAN_MAX = 180, PAN_STEP = 5;
    const TILT_MIN = 0, TILT_MAX = 180, TILT_STEP = 3;
    const REPEAT_MS_PAN = 120;
    const REPEAT_MS_TILT = 280;

    let panDeg = 0;
    let tiltDeg = 90;
    let statusPollTimer = null;
    let repeatTimer = null;
    let activeCmd = null;
    let tiltTrackHeight = 0;
    let panTrackWidth = 0;

    function sleep(ms) {
      return new Promise(function(resolve) { setTimeout(resolve, ms); });
    }

    function buildVerticalScale(trackEl, min, max, step) {
      trackEl.querySelectorAll('.scale-tick').forEach(function(el) { el.remove(); });
      const range = max - min;
      for (let v = max; v >= min; v -= step) {
        const tick = document.createElement('div');
        tick.className = 'scale-tick';
        tick.textContent = v;
        tick.dataset.value = String(v);
        tick.style.top = ((max - v) / range * 100) + '%';
        trackEl.appendChild(tick);
      }
    }

    function buildHorizontalScale(trackEl, min, max, step) {
      trackEl.querySelectorAll('.scale-tick').forEach(function(el) { el.remove(); });
      const range = max - min;
      for (let v = min; v <= max; v += step) {
        const tick = document.createElement('div');
        tick.className = 'scale-tick';
        tick.textContent = v;
        tick.style.left = ((v - min) / range * 100) + '%';
        trackEl.appendChild(tick);
      }
    }

    function buildLeftScale() {
      const track = document.getElementById('left-track');
      buildVerticalScale(track, 0, 100, 10);
      const marker = document.getElementById('left-marker');
      marker.style.top = '0%';
    }

    function buildTiltScale() {
      const track = document.getElementById('tilt-track');
      const viewport = document.getElementById('tilt-viewport');
      const range = TILT_MAX - TILT_MIN;
      const steps = range / 15;
      const extra = steps * 8;
      const vh = viewport.clientHeight || 300;
      tiltTrackHeight = vh * 2 + extra;
      track.style.height = tiltTrackHeight + 'px';
      buildVerticalScale(track, TILT_MIN, TILT_MAX, 15);
      updateTiltScale();
    }

    function buildPanScale() {
      const track = document.getElementById('pan-track');
      const viewport = document.getElementById('pan-viewport');
      const vw = viewport.clientWidth || 400;
      const range = PAN_MAX - PAN_MIN;
      panTrackWidth = Math.max(vw * 2.8, 960);
      track.style.width = panTrackWidth + 'px';
      track.style.height = '28px';
      track.innerHTML = '';
      for (let v = PAN_MIN; v <= PAN_MAX; v += 30) {
        const tick = document.createElement('div');
        tick.className = 'scale-tick';
        tick.textContent = v;
        tick.style.left = ((v - PAN_MIN) / range * panTrackWidth) + 'px';
        track.appendChild(tick);
      }
      updatePanScale();
    }

    function updatePanScale() {
      const viewport = document.getElementById('pan-viewport');
      const track = document.getElementById('pan-track');
      const vw = viewport.clientWidth;
      const range = PAN_MAX - PAN_MIN;
      const tickX = ((panDeg - PAN_MIN) / range) * panTrackWidth;
      track.style.transform = 'translateX(' + ((vw / 2) - tickX) + 'px)';
    }

    function updateTiltScale() {
      const viewport = document.getElementById('tilt-viewport');
      const track = document.getElementById('tilt-track');
      const vh = viewport.clientHeight;
      const th = track.offsetHeight || tiltTrackHeight;
      const range = TILT_MAX - TILT_MIN;
      const tickY = ((TILT_MAX - tiltDeg) / range) * th;
      const offset = (vh / 2) - tickY;
      track.style.transform = 'translateY(' + offset + 'px)';
    }

    function updateHudScales() {
      updatePanScale();
      updateTiltScale();
    }

    function applyLocalMove(cmd) {
      switch (cmd) {
        case 'up':    tiltDeg = Math.max(TILT_MIN, tiltDeg - TILT_STEP); break;
        case 'down':  tiltDeg = Math.min(TILT_MAX, tiltDeg + TILT_STEP); break;
        case 'left':  panDeg = Math.max(PAN_MIN, panDeg - PAN_STEP); break;
        case 'right': panDeg = Math.min(PAN_MAX, panDeg + PAN_STEP); break;
        default: return;
      }
      updateHudScales();
    }

    function initHudScales() {
      buildLeftScale();
      buildPanScale();
      buildTiltScale();
      updateHudScales();
    }

    function updateBatteryLabel(percent) {
      const el = document.getElementById('battery-label');
      if (percent === null || percent === undefined || percent < 0) {
        el.textContent = 'Battery: N/A';
      } else {
        el.textContent = 'Battery: ' + Math.round(percent) + '%';
      }
    }

    function pollStatus() {
      fetch('/api/status')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (typeof data.pan_deg === 'number') {
            panDeg = Math.max(PAN_MIN, Math.min(PAN_MAX, data.pan_deg));
          }
          if (typeof data.tilt_deg === 'number') {
            tiltDeg = Math.max(TILT_MIN, Math.min(TILT_MAX, data.tilt_deg));
          }
          updateHudScales();
          updateBatteryLabel(data.battery_percent);
        })
        .catch(function() {});
    }

    function startStatusPolling() {
      pollStatus();
      if (statusPollTimer) clearInterval(statusPollTimer);
      statusPollTimer = setInterval(pollStatus, 500);
    }

    function sendCmd(cmd) {
      if (cmd === 'center') return;
      fetch('/cmd?move=' + encodeURIComponent(cmd)).catch(function() {});
    }

    function stopHold() {
      if (repeatTimer) {
        clearInterval(repeatTimer);
        repeatTimer = null;
      }
      if (activeCmd) {
        document.querySelectorAll('.arrow-btn.holding').forEach(function(b) {
          b.classList.remove('holding');
        });
      }
      activeCmd = null;
    }

    function startHold(cmd, btn) {
      if (cmd === 'center') return;
      stopHold();
      activeCmd = cmd;
      btn.classList.add('holding');
      applyLocalMove(cmd);
      sendCmd(cmd);
      const interval = (cmd === 'up' || cmd === 'down') ? REPEAT_MS_TILT : REPEAT_MS_PAN;
      repeatTimer = setInterval(function() {
        applyLocalMove(cmd);
        sendCmd(cmd);
      }, interval);
    }

    function bindHoldControls() {
      document.querySelectorAll('.arrow-btn[data-cmd]').forEach(function(btn) {
        const cmd = btn.getAttribute('data-cmd');

        btn.addEventListener('pointerdown', function(e) {
          e.preventDefault();
          if (btn.setPointerCapture) btn.setPointerCapture(e.pointerId);
          startHold(cmd, btn);
        });

        function endHold(e) {
          if (btn.hasPointerCapture && btn.hasPointerCapture(e.pointerId)) {
            btn.releasePointerCapture(e.pointerId);
          }
          stopHold();
        }

        btn.addEventListener('pointerup', endHold);
        btn.addEventListener('pointercancel', endHold);
        btn.addEventListener('pointerleave', function(e) {
          if (e.pointerType === 'mouse' && activeCmd === cmd) endHold(e);
        });
      });

      window.addEventListener('pointerup', stopHold);
      window.addEventListener('blur', stopHold);
    }

    async function scrambleReveal(element, finalText, durationMs) {
      const target = finalText.toUpperCase();
      const len = target.length;
      const framesPerChar = 10;
      const frameDelay = durationMs / (len * framesPerChar);
      let locked = '';

      for (let i = 0; i < len; i++) {
        for (let f = 0; f < framesPerChar; f++) {
          let display = locked;
          for (let j = i; j < len; j++) {
            const ch = target[j];
            display += (ch === ' ' || ch === ',') ? ch
              : SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)];
          }
          element.textContent = display;
          await sleep(frameDelay);
        }
        locked += target[i];
        element.textContent = locked;
      }
    }

    async function fadeBootText(ms) {
      const el = document.getElementById('boot-text');
      el.style.transition = 'opacity ' + (ms / 1000) + 's ease';
      el.classList.add('fading');
      await sleep(ms);
      el.classList.remove('fading');
      el.textContent = '';
      el.style.transition = '';
    }

    async function runBootSequence() {
      const bootText = document.getElementById('boot-text');
      for (let i = 0; i < BOOT_MESSAGES.length; i++) {
        const msg = BOOT_MESSAGES[i];
        await scrambleReveal(bootText, msg.text, msg.reveal);
        await sleep(msg.hold);
        if (i < BOOT_MESSAGES.length - 1) await fadeBootText(msg.fade);
      }
      await fadeBootText(BOOT_MESSAGES[BOOT_MESSAGES.length - 1].fade);
      finishBootAndPlayIntro();
    }

    function waitForVideoEvent(video, eventName) {
      return new Promise(function(resolve) {
        if (eventName === 'ended' && video.ended) {
          resolve();
          return;
        }
        video.addEventListener(eventName, resolve, { once: true });
      });
    }

    function waitForIntroReady(video, timeoutMs) {
      return new Promise(function(resolve, reject) {
        if (video.readyState >= HTMLMediaElement.HAVE_ENOUGH_DATA) {
          resolve();
          return;
        }
        function cleanup() {
          clearTimeout(timer);
          video.removeEventListener('canplaythrough', onReady);
          video.removeEventListener('error', onError);
        }
        function onReady() {
          cleanup();
          resolve();
        }
        function onError() {
          cleanup();
          var detail = video.error ? video.error.code : 'unknown';
          reject(new Error('Intro video failed to load (code ' + detail + ')'));
        }
        var timer = setTimeout(function() {
          cleanup();
          reject(new Error('Intro video load timed out'));
        }, timeoutMs);
        video.addEventListener('canplaythrough', onReady, { once: true });
        video.addEventListener('error', onError, { once: true });
      });
    }

    function preloadIntroVideo() {
      var video = document.getElementById('intro-video');
      video.loop = false;
      if (video.getAttribute('src') !== INTRO_VIDEO_URL) {
        video.setAttribute('src', INTRO_VIDEO_URL);
        video.load();
      }
    }

    async function startIntroPlayback(video) {
      video.loop = false;
      video.currentTime = 0;
      try {
        video.muted = false;
        await video.play();
        return;
      } catch (err) {
        console.warn('Unmuted autoplay blocked, retrying muted:', err);
      }
      video.muted = true;
      await video.play();
    }

    async function playIntroVideo() {
      var introScreen = document.getElementById('intro-screen');
      var video = document.getElementById('intro-video');
      preloadIntroVideo();

      introScreen.style.display = 'flex';
      introScreen.setAttribute('aria-hidden', 'false');
      introScreen.classList.add('visible');
      await sleep(400);

      try {
        await waitForIntroReady(video, 20000);
      } catch (err) {
        console.warn(err.message);
        return;
      }

      try {
        await startIntroPlayback(video);
      } catch (err) {
        console.warn('Intro video could not play:', err);
        return;
      }

      if (video.paused) {
        console.warn('Intro video play() resolved but video is still paused');
        return;
      }

      await waitForVideoEvent(video, 'ended');
    }

    async function hideIntroScreen() {
      const introScreen = document.getElementById('intro-screen');
      const video = document.getElementById('intro-video');
      introScreen.classList.add('hidden');
      introScreen.classList.remove('visible');
      await sleep(600);
      video.pause();
      video.removeAttribute('src');
      video.load();
      introScreen.style.display = 'none';
      introScreen.setAttribute('aria-hidden', 'true');
      introScreen.classList.remove('hidden');
    }

    async function finishBootAndPlayIntro() {
      const boot = document.getElementById('boot-screen');
      stopSignalIconAnimation();
      boot.classList.add('hidden');
      await sleep(1000);
      boot.style.display = 'none';
      await playIntroVideo();
      await hideIntroScreen();
      revealControlPanel();
    }

    function startSignalIconAnimation() {
      document.getElementById('wifi-logo').classList.add('animating');
    }

    function stopSignalIconAnimation() {
      document.getElementById('wifi-logo').classList.remove('animating');
    }

    function hideControlPanel() {
      document.getElementById('control-panel').classList.remove('visible');
    }

    function revealControlPanel() {
      document.getElementById('control-panel').classList.add('visible');
      initHudScales();
      startStatusPolling();
    }

    window.onload = function() {
      hideControlPanel();
      document.getElementById('intro-screen').style.display = 'none';
      preloadIntroVideo();
      startSignalIconAnimation();
      bindHoldControls();
      runBootSequence();
    };

    window.addEventListener('resize', function() {
      if (document.getElementById('control-panel').classList.contains('visible')) {
        buildPanScale();
        buildTiltScale();
        updateHudScales();
      }
    });
  </script>
</body>
</html>
